<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IPA Finder</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      text-align: center;
      margin-top: 100px;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 350px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    input, select, button {
      padding: 10px;
      margin: 10px 0;
      width: 90%;
      font-size: 16px;
    }

    button {
      background: #007BFF;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>IPA Transcription Finder</h2>

  <!-- Language Selector -->
  <select id="lang">
    <option value="en">English</option>
    <option value="es">Spanish</option>
    <option value="fr">French</option>
    <option value="de">German</option>
  </select>

  <!-- Search Bar -->
  <input type="text" id="word" placeholder="Enter a word..." />

  <!-- Search Button -->
  <button onclick="fetchIPA()">Search</button>

  <!-- Result Display -->
  <div id="result"></div>
</div>

<script>
  async function fetchIPA() {
    const word = document.getElementById("word").value;
    const lang = document.getElementById("lang").value;
    const resultDiv = document.getElementById("result");

    if (!word) {
      resultDiv.innerHTML = "⚠️ Please enter a word.";
      return;
    }

    resultDiv.innerHTML = "Loading...";

    try {
      const response = await fetch(`https://cen-flask-api.vercel.app/?lang=${lang}&word=${word}`);
      const data = await response.json();

      // Your Flask API returns: jsonify(word, transcription)
      const returnedWord = data[0];
      const ipa = data[1];

      resultDiv.innerHTML = `
        Word: <b>${returnedWord}</b><br>
        IPA: <b>/${ipa}/</b>
      `;
    } catch (error) {
      console.error(error);
      resultDiv.innerHTML = "❌ Error fetching data.";
    }
  }
</script>

</body>
</html>
